<div class="flex flex-col">
  @if (label) {
    <label class="text-text font-bold text-sm mb-1" [for]="formName">{{ label }}</label>
  }

  <div class="w-full flex text-sm">
    <input
      class="w-full h-11 rounded bg-light-gray px-3 text-md text-text outline-0"
      [type]="type"
      [formControlName]="formName"
      [placeholder]="placeholder"
      required
    />

    @if (icon) {
      <div
        class="flex items-center justify-center h-11 w-11 rounded bg-primary text-light-gray text-lg"
      >
        <i class="ph {{ icon }}"></i>
      </div>
    }
  </div>
</div>
