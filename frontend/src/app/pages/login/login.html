<app-default-login-layout
  title="Entre com sua conta"
  primaryButtonText="Entrar"
  secondaryButtonText="Cadastre-se"
>
  <form action="#">
    <div>
      <label for="email">E-mail</label>
      <input type="text" id="email" type="email" placeholder="Digite seu e-mail" required />
    </div>
    <div>
      <label for="password">Senha</label>
      <input type="text" id="password" type="password" placeholder="Digite sua senha" required />
    </div>
  </form>
</app-default-login-layout>
