<app-default-login-layout
  pageTitle="Entre com sua conta"
  primaryButtonText="Entrar"
  secondaryButtonText="Cadastre-se"
  (submit)="submit()"
  (navigate)="navigate()"
  [disablePrimaryButton]="!loginForm.invalid"
>
  <form [formGroup]="loginForm" class="w-full flex flex-col mt-12 gap-4">
    <app-primary-input
      formName="email"
      type="email"
      label="E-mail"
      placeholder="Digite seu E-mail"
      icon="ph-envelope-simple"
    >
    </app-primary-input>
    <app-primary-input
      formName="password"
      type="password"
      label="Senha"
      placeholder="Digite sua Senha"
      icon="ph-lock-key"
    ></app-primary-input>
  </form>
  <a class="w-full text-end mt-2.5 text-sm text-secondary cursor-pointer hover:opacity-80">
    Esqueceu a senha?
  </a>
</app-default-login-layout>
