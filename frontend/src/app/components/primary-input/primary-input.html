<div class="flex flex-col">
  @if (label) {
    <label class="text-text font-bold text-sm mb-1" [for]="formName">{{ label }}</label>
  }

  <div class="w-full flex text-sm">
    <input
      class="w-full h-11 rounded-l bg-light-gray px-3 text-md placeholder:text-tex outline-0"
      [type]="type"
      [formControlName]="formName"
      [placeholder]="placeholder"
      required
    />
    <div class="rounded-r p-3 bg-primary">
      <ng-content></ng-content>
    </div>
  </div>
</div>
