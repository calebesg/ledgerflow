<main class="grid grid-cols-3 h-full">
  <section class="col-span-1 flex flex-col justify-center items-center p-8">
    <img src="logo.svg" alt="logo" />
    <h2 class="font-bold text-xl text-center mt-7">{{ title }}</h2>
    <app-primary-button class="w-full" text="{{ primaryButtonText }}"></app-primary-button>
    <div><span>OR</span></div>
    <app-secondary-button class="w-full" text="{{ secondaryButtonText }}"></app-secondary-button>
  </section>
  <section class="col-span-2 flex flex-col items-center justify-center gap-2 bg-background-gray">
    <h1 class="font-medium text-3xl">You Shoud, MoveIt!</h1>
    <img src="main-image.svg" alt="Um menino andando de skate" />
  </section>
</main>
