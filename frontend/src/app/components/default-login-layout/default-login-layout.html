<app-default-container-layout>
  <section class="flex flex-col justify-center items-center p-8 w-md bg-white rounded-lg z-10">
    <h2 class="font-bold text-xl text-center">{{ pageTitle }}</h2>

    <ng-content></ng-content>

    <app-primary-button
      (click)="submit()"
      class="w-full mt-8"
      text="{{ primaryButtonText }}"
    ></app-primary-button>

    <div class="text-text-smooth text-sm flex w-full items-center gap-3 mt-4">
      <div class="grow h-px bg-text-smooth"></div>
      <span>OU</span>
      <div class="grow h-px bg-text-smooth"></div>
    </div>

    <app-secondary-button
      (click)="navigate()"
      class="w-full mt-4"
      text="{{ secondaryButtonText }}"
    ></app-secondary-button>
  </section>
</app-default-container-layout>
