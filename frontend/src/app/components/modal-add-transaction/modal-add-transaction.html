<div class="modal-overlay">
  <div class="modal">
    <h2 class="mt-12 mb-3.5 text-primary">Nova Transação</h2>

    <form>
      <div class="input-group">
        <label class="sr-only" for="description">Descrição</label>
        <input type="text" name="description" id="description" placeholder="Descrição" />
      </div>

      <div class="input-group">
        <label class="sr-only" for="amount">Valor</label>
        <input type="number" step="0.01" name="amount" id="amount" placeholder="Valor" />

        <small class="help">
          Use o sinal - (negativo) para despesas e , para(vírgula) para casas decimais
        </small>
      </div>

      <div class="input-group">
        <label class="sr-only" for="date">Data</label>
        <input type="date" name="date" id="date" />
      </div>

      <div class="input-group actions">
        <a href="#" class="button cancel">Cancelar</a>
        <button>Salvar</button>
      </div>
    </form>
  </div>
</div>
